<!DOCTYPE html>
<html>
<head>
    <title>Movie App</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="stylish.css">
</head>
<style>
    body {
        margin: 0;
        padding: 30px;
        font-family: Arial, sans-serif;
    }
</style>

<body>

<div class="navbar">
    <div class="nav-left">
        <button id="homeBtn">Home</button>

        <div class="dropdown">
            <button class="dropbtn">Movies</button>
            <div class="dropdown-content">
                <a href="#" data-category="popular">Popular</a>
                <a href="#" data-category="top_rated">Top Rated</a>
                <a href="#" data-category="now_playing">Now Playing</a>
                <a href="#" data-category="upcoming">Upcoming</a>
            </div>
        </div>
    </div>

    <div class="nav-right">

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search movies...">
            <button id="searchSubmit">Search</button>
        </div>

        <button id="favBtn">&#9829; Favorites</button>
    </div>
</div>

<div id="homeView"></div>

<!-- the fav bar -->
<div id="favView" style="display:none;">
    <h2 class="category-title">My Favorites</h2>
    <div id="favResults" class="movie-grid"></div>
    <p id="favEmpty" style="display:none; text-align:center; color:#aaa;">No favorites yet. Click ♥ on any movie to save it!</p>
</div>



<script src="scri.js"></script>

</body>
</html>
